<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Setup</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<main class="hero">

    <div class="glass-card">

        <h1>NOVA</h1>

        <h2>First-Time Setup</h2>

        <p class="description">
            Hello.<br><br>
            I'm NOVA, your personal AI Operating System.<br><br>
            Before we begin, what should I call you?
        </p>

        <input
            type="text"
            id="username"
            placeholder="Enter your name">

        <button id="continueButton">
            CONTINUE
        </button>

    </div>

</main>

<script src="js/setup.js"></script>

</body>
</html>
